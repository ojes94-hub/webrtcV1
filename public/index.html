<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Video Call Pro - Dynamic Pinning</title>
  <link rel="stylesheet" href="css/vc.css">
  <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>

  <div class="content-wrapper">
    <main class="video-grid fullscreen-init" id="videos">
      <!-- Initial fullscreen local video before call -->
      <div class="video-box">
        <div class="video-tile" id="tile-susan">
          <button class="minimize-btn" onclick="toggleMinimize(event)">
            <i data-lucide="minimize-2"></i>
          </button>
          <video class="video" id="localVideo" autoplay muted playsinline></video>
          <div class="mute-indicator"><i data-lucide="mic-off"></i></div>
          <div class="tile-overlay"><span>Susan Miko (Host)</span><i data-lucide="mic"></i></div>
        </div>
        <div class="status">
          <p id="status">Encrypted</p>
          <p id="connectionState">Connection: Secured</p>
        </div>
      </div>
      <!-- Remote video boxes will be dynamically appended here by JS -->
    </main>

    <aside class="sidebar hidden" id="sidebar">
      <div class="sidebar-header">
        <button class="tab-btn active" onclick="switchTab('chat', this)">Chat</button>
        <button class="tab-btn" onclick="switchTab('people', this)">People</button>
      </div>
      <div id="chat-section" class="sidebar-content active">
        <div class="messages"><p><strong>System:</strong> Welcome to the call.</p></div>
        <div class="chat-input">
          <input type="text" placeholder="Send a message...">
          <button class="send-btn"><i data-lucide="send"></i></button>
        </div>
      </div>
      <div id="people-section" class="sidebar-content">
        <div class="people-list"></div>
      </div>
    </aside>
  </div>

<footer class="controls-bar">
    <button class="icon-btn" id="startCallBtn"><i data-lucide="phone"></i></button>
    <button class="icon-btn" id="toggleAudioBtn"><i data-lucide="mic"></i></button>
    <button class="icon-btn" id="toggleVideoBtn"><i data-lucide="video"></i></button>
    <button class="icon-btn"><i data-lucide="hand"></i></button>
    <button class="icon-btn"><i data-lucide="monitor"></i></button>
    <button class="icon-btn" onclick="toggleSidebar()"><i data-lucide="message-square"></i></button>
    <button class="end-call-btn" id="hangupBtn"><i data-lucide="phone-off"></i></button>
  </footer>
  
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/vc.js" defer></script>
  <script src="js/mainvc.js" defer></script>
</body>
</html>
